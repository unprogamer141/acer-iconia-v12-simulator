<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Acer Iconia V12 Simulator</title>
  <link rel="stylesheet" href="css/style.css"/>
</head>
<body>
  <div id="tablet">
    <div id="screen">

      <!-- Lockscreen -->
      <div id="lockscreen">
        <div id="clock">12:00</div>
        <div id="date">Thursday, March 19</div>
        <div id="unlock-hint">Swipe up to unlock</div>
      </div>

      <!-- Homescreen -->
      <div id="homescreen">
        <div id="statusbar">
          <span id="status-time">12:00</span>
          <span id="status-icons">WiFi | BT | 🔋100%</span>
        </div>
        <div id="appgrid">
          <div class="app" onclick="openApp('Camera')"><div>📷</div><span>Camera</span></div>
          <div class="app" onclick="openApp('Gallery')"><div>🖼️</div><span>Gallery</span></div>
          <div class="app" onclick="openApp('Settings')"><div>⚙️</div><span>Settings</span></div>
          <div class="app" onclick="openApp('Files')"><div>📁</div><span>Files</span></div>
          <div class="app" onclick="openApp('Browser')"><div>🌐</div><span>Browser</span></div>
          <div class="app" onclick="openApp('Calculator')"><div>🧮</div><span>Calculator</span></div>
          <div class="app" onclick="openApp('Clock')"><div>🕐</div><span>Clock</span></div>
          <div class="app" onclick="openApp('Music')"><div>🎵</div><span>Music</span></div>
          <div class="app" onclick="openApp('Notes')"><div>📝</div><span>Notes</span></div>
          <div class="app" onclick="openApp('Maps')"><div>🗺️</div><span>Maps</span></div>
        </div>
        <div id="navbar">
          <span onclick="openApp('Back')">◀</span>
          <span onclick="openApp('Home')">⬤</span>
          <span onclick="openApp('Recents')">▣</span>
        </div>
      </div>

      <!-- App Screen -->
      <div id="appscreen">
        <div id="appscreen-header">
          <span onclick="openApp('Back')">◀</span>
          <span id="appscreen-title">App</span>
        </div>
        <div id="appscreen-content"></div>
      </div>

    </div>
  </div>
  <script src="js/main.js"></script>
</body>
</html>
