<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Acer Iconia V12 Simulator</title>
  <link rel="stylesheet" href="css/style.css"/>
</head>
<body>
  <div id="tablet">
    <div id="screen">

      <!-- Lockscreen -->
      <div id="lockscreen">
        <div id="clock">12:00</div>
        <div id="date">Thursday, March 19</div>
        <div id="unlock-hint">Swipe up to unlock</div>
      </div>

      <!-- Homescreen -->
      <div id="homescreen">
        <!-- Status Bar -->
        <div id="statusbar">
          <span id="status-time">12:00</span>
          <span id="status-icons">WiFi | BT | 🔋100%</span>
        </div>
        <!-- App Grid -->
        <div id="appgrid">
          <div class="app" onclick="openApp('Camera')">📷<span>Camera</span></div>
          <div class="app" onclick="openApp('Gallery')">🖼️<span>Gallery</span></div>
          <div class="app" onclick="openApp('Settings')">⚙️<span>Settings</span></div>
          <div class="app" onclick="openApp('Files')">📁<span>Files</span></div>
          <div class="app" onclick="openApp('Browser')">🌐<span>Browser</span></div>
          <div class="app" onclick="openApp('Calculator')">🧮<span>Calculator</span></div>
          <div class="app" onclick="openApp('Clock')">🕐<span>Clock</span></div>
          <div class="app" onclick="openApp('Music')">🎵<span>Music</span></div>
          <div class="app" onclick="openApp('Notes')">📝<span>Notes</span></div>
          <div class="app" onclick="openApp('Maps')">🗺️<span>Maps</span></div>
        </div>
        <!-- Navigation Bar -->
        <div id="navbar">
          <span onclick="openApp('Back')">◀</span>
          <span onclick="openApp('Home')">⬤</span>
          <span onclick="openApp('Recents')">▣</span>
        </div>
      </div>

    </div>
  </div>
  <script src="js/main.js"></script>
</body>
</html>
